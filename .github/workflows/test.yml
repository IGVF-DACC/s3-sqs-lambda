name: Tests

on: push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          # Match the Lambda runtime version
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt -r lambda/tagging_handler/requirements.txt

      - name: Run tests
        run: pytest tests/ -v
